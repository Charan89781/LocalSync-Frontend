name: localsync
description: A hyperlocal smart community ecosystem.
version: 1.0.0+1
publish_to: 'none'

environment:
  sdk: '>=3.2.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # State Management
  flutter_riverpod: ^2.4.9
  riverpod_annotation: ^2.3.3

  # Firebase - pinned to latest stable compatible set
  firebase_core: ^3.15.2
  firebase_auth: ^5.7.0
  cloud_firestore: ^5.6.12
  firebase_storage: ^12.4.10
  firebase_messaging: ^15.2.10
  google_sign_in: ^6.2.1

  # Navigation & UI
  go_router: ^12.1.3
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  cached_network_image: ^3.3.0
  shimmer: ^3.0.0
  flutter_spinkit: ^5.2.0

  # Services & Utilities
  geolocator: ^10.1.0
  geocoding: ^3.0.0
  google_maps_flutter: ^2.5.3
  flutter_local_notifications: ^17.0.0
  intl: ^0.19.0
  image_picker: ^1.0.7
  shared_preferences: ^2.2.2
  local_auth: ^2.1.6
  cupertino_icons: ^1.0.6
  url_launcher: ^6.2.5
  share_plus: ^10.1.0
  http: ^1.2.0
  google_generative_ai: ^0.4.6
  web: ^1.1.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1
  riverpod_generator: ^2.3.9
  build_runner: ^2.4.7

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/animations/
